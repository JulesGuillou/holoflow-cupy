# Single-thread CUDA-stream CuPy LDH benchmark configuration.
#
# The math and physical parameters match the CuPy-naive and threaded
# benchmarks. The `streams` section controls the number of in-flight buffer
# slots used by the single host-thread stream/event scheduler.

input:
  # path: 'E:\InputData\250220_GUJ0206_L.holo'
  file_path: C:\Users\guill\Documents\holofiles_data\250527_GUJ_L_2.holo

signal:
  sample_rate_hz: 37000.0
  doppler_low_hz: 8000.0
  doppler_high_hz: 16000.0

  propagation_distance_m: 4.86e-1
  wavelength_m: 8.52e-7
  dx_m: 2.0e-5
  dy_m: 2.0e-5

schedule:
  batch_frames: 32
  batches_per_output: 64

benchmark:
  seconds: 10.0
  warmup_outputs: 1

display:
  report_path: 'cupy_streams_report.txt'
  show_image: true
  contrast_roi_radius: 0.8
  contrast_low_percentile: 0.2
  contrast_high_percentile: 99.8

dtypes:
  acquisition: uint8
  real: float32
  complex: complex64

execution:
  mode_matrix:
    precompute_static_tensors: [false, true]
    preallocate_work_buffers: [false, true]
    dummy_gil_thread: [false, true]

  dummy_gil_inner_loops: 200000
  dummy_gil_switch_interval_s: 0.0005

  # Example explicit mode list:
  #
  # modes:
  #   - name: 'cupy-streams | precompute=on | prealloc=on | gil=off'
  #     precompute_static_tensors: true
  #     preallocate_work_buffers: true
  #     enable_dummy_gil_thread: false

streams:
  # Number of K in-flight buffer slots. Slot n % K is not reused until its
  # previous D2H completion event has completed.
  num_slots: 32

  # Number of formal pipeline ticks kept submitted ahead of completed outputs.
  # Each tick queues H2D(x_t), compute(x_{t-1}), and D2H(x_{t-2}) when available.
  pipeline_prefetch_batches: 8
