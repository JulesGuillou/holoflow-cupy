# Multi-threaded CuPy LDH benchmark configuration.
#
# The math and physical parameters match the CuPy-naive benchmark. The
# additional `threading` section controls the host queue schedule.

input:
  # path: 'E:\InputData\250220_GUJ0206_L.holo'
  file_path: C:\Users\guill\Documents\holofiles_data\250527_GUJ_L_2.holo

signal:
  sample_rate_hz: 37000.0
  doppler_low_hz: 8000.0
  doppler_high_hz: 16000.0

  propagation_distance_m: 4.86e-1
  wavelength_m: 8.52e-7
  dx_m: 2.0e-5
  dy_m: 2.0e-5

schedule:
  batch_frames: 32
  batches_per_output: 64

benchmark:
  seconds: 10.0
  warmup_outputs: 1

display:
  report_path: 'cupy_threaded_report.txt'
  show_image: true
  contrast_roi_radius: 0.8
  contrast_low_percentile: 0.2
  contrast_high_percentile: 99.8

dtypes:
  acquisition: uint8
  real: float32
  complex: complex64

execution:
  mode_matrix:
    precompute_static_tensors: [false, true]
    preallocate_work_buffers: [false, true]
    dummy_gil_thread: [false, true]

  # Example explicit mode list:
  #
  # modes:
  #   - name: 'cupy-threaded | precompute=on | prealloc=on | gil=off'
  #     precompute_static_tensors: true
  #     preallocate_work_buffers: true
  #     enable_dummy_gil_thread: true

  dummy_gil_inner_loops: 200000
  dummy_gil_switch_interval_s: 0.00005

threading:
  queue_depth: 8
  # timed_put uses queue.put(..., timeout=queue_put_timeout_s) for every queue
  # output operation. nowait uses queue.put_nowait and retries in the spin loop.
  queue_put_policy: timed_put
  queue_put_timeout_s: 0.5
  gil_switch_interval_s: 0.0005
